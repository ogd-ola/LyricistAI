<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricistAI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav style="display: flex; justify-content: flex-end; padding: 10px 0;">
            <a href="login.html" id="authNav" style="text-decoration: none; color: #666; font-weight: 500;">Sign In</a>
        </nav>
        <header>
            <h1>Vocal Harmony Generator</h1>
            <p>Upload a melody, get the choir.</p>
        </header>

        <section class="upload-section">
            <input type="file" id="audioUpload" accept=".mp3,.m4a,.mpeg,audio/mpeg,audio/mp4,audio/x-m4a">
            <textarea id="lyricsInput" placeholder="Paste lyrics here..."></textarea>
            <button id="generateBtn">Generate Harmonies</button>

            <div id="progressContainer" style="display:none; width: 100%; background: #333; margin: 10px 0;">
                <div id="progressBar" style="width: 0%; height: 10px; background: #6200ee;"></div>
                <p id="progressText" style="font-size: 12px; color: #bbb;">Uploading audio...</p>
            </div>
        </section>

        <hr>

        <section class="mixer-interface">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Mixer</h2>
                <div class="master-controls">
                    <button id="playAllBtn" class="secondary-btn">Play All</button>
                    <button id="pauseAllBtn" class="secondary-btn">Pause All</button>
                </div>
            </div>

            <div class="view-modes" style="margin: 10px 0;">
                <button onclick="switchView('default')">Standard View</button>
                <button onclick="switchView('sheet')">Sheet Music Mode</button>
            </div>

            <div id="tracksContainer">
                </div>
        </section>

        <section class="solfege-display">
            <h3>Visual Solfege</h3>
            <div id="solfegeOutput" class="solfege-box">
                Waiting for generation...
            </div>
        </section>
    </div>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script>
        // Firebase session management
        firebase.auth().onAuthStateChanged((user) => {
            const authNav = document.getElementById('authNav');
            if (user) {
                authNav.textContent = `Logout (${user.email})`;
                authNav.onclick = () => firebase.auth().signOut().then(() => location.reload());
            } else {
                authNav.textContent = 'Sign In';
                authNav.href = 'login.html';
            }
        });
    </script>

    <script src="app.js"></script>
</body>
</html>
